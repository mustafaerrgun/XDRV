name: XDR CI

on:
  push:
    branches:
      - main
      - develop
      - feature/*
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mustafaerrgun/xdrv-builder:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile XDR sources
        run: make

  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mustafaerrgun/xdrv-builder:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run MISRA check
        run: |
          chmod +x ./Tests/misra_check.sh
          ./Tests/misra_check.sh

      - name: Upload MISRA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: misra-report
          path: Tests/misra_report.txt
